<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aspect K書會館預約系統</title>

  <style>
    body {
      font-family: "Microsoft JhengHei", Arial, sans-serif;
      background: #f5f1e8;
      padding: 20px;
      margin: 0;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      color: #8b3a0e;
      margin-bottom: 20px;
      font-size: 50px;
    }

    .box {
      background: white;
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    h2 {
      margin-top: 0;
      font-size: 22px;
      color: #333;
    }

    button {
      border: 1px solid #ccc;
      background: #f7f7f7;
      border-radius: 10px;
      padding: 12px 16px;
      cursor: pointer;
      font-size: 16px;
      margin: 5px;
    }

    button:hover:not(:disabled) {
      background: #efaf7e;
    }

    button:disabled {
      cursor: not-allowed;
    }

    .selected {
      background: #8b3a0e !important;
      color: white !important;
      border-color: #8b3a0e !important;
    }

    .past-time {
      background: #ddd !important;
      color: #888 !important;
      border-color: #ccc !important;
      cursor: not-allowed !important;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 16px;
      box-sizing: border-box;
    }

    .room {
      background: #fafafa;
      border-radius: 15px;
      padding: 20px;
      overflow-x: auto;
    }

    .stage {
      text-align: center;
      background: #ddd;
      padding: 10px;
      margin-bottom: 15px;
      border-radius: 8px;
    }

    .seat-grid {
      display: grid;
      grid-template-columns: 120px 80px 120px;
      gap: 12px;
      justify-content: center;
    }

    .aisle {
      width: 80px;
      min-height: 70px;
    }

    .row-btn {
      width: 100%;
      min-height: 70px;
      font-size: 18px;
      line-height: 1.5;
      border-radius: 10px;
    }

    .row-btn small {
      font-size: 13px;
      color: #666;
    }

    .internal-selected {
      background: #4caf50 !important;
      color: white !important;
      border-color: #4caf50 !important;
    }

    .external-selected {
      background: #2196f3 !important;
      color: white !important;
      border-color: #2196f3 !important;
    }

    .external-selected small,
    .internal-selected small {
      color: white !important;
    }

    .locked-row {
      background: #f2c94c !important;
      color: #333 !important;
      border-color: #f2c94c !important;
      cursor: not-allowed !important;
    }

    .locked-row small {
      color: #333 !important;
    }

    .booked-row {
      background: #bdbdbd !important;
      color: white !important;
      border-color: #bdbdbd !important;
      cursor: not-allowed !important;
    }

    .booked-row small {
      color: white !important;
    }

    .submit-btn {
      width: 100%;
      background: #8b3a0e;
      color: white;
      border: none;
      margin-top: 10px;
    }

    .submit-btn:hover:not(:disabled) {
      background: #6f2f0b;
    }

    #resultText {
      white-space: pre-line;
      line-height: 1.8;
    }

    .notice {
      line-height: 1.8;
    }

    @media screen and (max-width: 768px) {
      body {
        padding: 12px;
      }

      h1 {
        font-size: 28px !important;
        line-height: 1.3 !important;
        margin-bottom: 10px !important;
      }

      .box {
        padding: 16px;
        margin-bottom: 16px;
        overflow: hidden;
      }

      #bookingDate {
        width: 85%;
        max-width: 500px;
        display: block;
        margin: 10px auto;
      }

      .room {
        padding: 10px !important;
        overflow-x: hidden !important;
      }

      .stage {
        width: 100% !important;
        box-sizing: border-box !important;
      }

      .seat-grid {
        grid-template-columns: 1fr 35px 1fr !important;
        gap: 8px !important;
        justify-content: center !important;
      }

      .row-btn {
        width: 100% !important;
        min-height: 64px !important;
        font-size: 15px !important;
      }

      .aisle {
        width: 35px !important;
        height: 36px !important;
      }

      input {
        height: 44px !important;
        font-size: 16px !important;
        padding: 8px 12px !important;
        box-sizing: border-box;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Aspect K書會館預約系統</h1>

    <div class="box">
      <h2>1. 選擇日期</h2>
      <input type="date" id="bookingDate" onchange="handleDateChange()" />
      <p id="dayTypeText">請先選擇日期</p>
    </div>

    <div class="box">
      <h2>2. 選擇時段</h2>
      <div id="timeButtons"></div>
      <p id="selectedTimesText">尚未選擇時段</p>
    </div>

    <div class="box">
      <h2>3. 是否為雅斯貝學員</h2>
      <button type="button" onclick="selectUserType(this, 'internal')">雅斯貝學員</button>
      <button type="button" onclick="selectUserType(this, 'external')">班外生</button>
      <p id="userTypeText">尚未選擇身分</p>
    </div>

    <div class="box">
      <h2>4. 選擇排位</h2>
      <p style="color: #666;">※ 同一排座位皆可使用</p>

      <div class="room">
        <div class="stage">講台</div>
        <div id="seatGrid" class="seat-grid"></div>
      </div>

      <p id="selectedSeatText">尚未選擇排位</p>
    </div>

    <div class="box">
      <h2>5. 填寫資料</h2>
      <input id="name" placeholder="姓名" />
      <input id="phone" placeholder="請輸入電話，例如 0912345678"  required type="tel"/>
     
      <input id="email" placeholder="Email" />
    </div>

    <div class="box">
      <h2>館內規則</h2>
      <div class="notice">
        ● 本會館採預約制<br />
        ● 預約送出前，座位會為您保留 10 分鐘<br />
        ● 離席超過 20 分鐘，座位將釋出給候補同學<br />
        ● 讀書期間請勿任意進出教室（生理需求除外）<br />
        ● 如需取消預約，請於預約日前透過確認信連結取消<br />
        ● 預約當天取消請私訊官方 LINE 聯繫我們
      </div>
    </div>

    <div class="box">
      <button type="button" class="submit-btn" onclick="submitBooking()">送出預約</button>
    </div>

    <div class="box">
      <h2>結果</h2>
      <p id="resultText">尚未預約</p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const supabaseUrl = "https://uebzafxelfpfmpqbcgwd.supabase.co";
    const supabaseKey = "sb_publishable_JTcWsklR-rYX5AqKYxdymQ_b746IsEe";
    const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);
    const holidayList = [
    "2026-01-01",
    "2026-02-16",
    "2026-02-17",
    "2026-02-18",
    "2026-02-19",
    "2026-02-20",
    "2026-02-28",
    "2026-04-04",
    "2026-04-05",
    "2026-05-01",
    "2026-06-19",
    "2026-09-25",
    "2026-09-28",
    "2026-10-10",
    "2026-10-25",
    "2026-12-25"
];

    const selectedDate = this.value;

    if (holidayList.includes(selectedDate)) {

    ```
    alert("此日期為國定假日，Aspect K書會館公休，暫不開放預約。");

    this.value = "";
    ```

    }

};

    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzI_ReRWMB4sEtKLYbZ_rzm5O_f8iyz4F_l_IORoVg6R1bSlXaQROgQf1WOFwSHy9RWAA/exec";

    // 取消頁面網址：若你的 cancel.html 上傳在 Netlify 根目錄，這樣即可
    const CANCEL_PAGE_URL = "https://aspect-english.github.io/cancel/";

    let selectedDate = "";
    let selectedTimes = [];
    let selectedRow = "";
    let userType = "";
    let selectedDayType = "";

    let currentLockTokens = [];
    let lockedRows = [];
    let bookedRows = [];

    const fullDayTimes = [
      "13:30–14:15",
      "14:25–15:10",
      "15:20–16:05",
      "16:15–17:00",
      "17:10–17:55",
      "18:05–18:50",
      "19:00–19:45",
      "19:55–20:40"
    ];

    const fourLessonTimes = [
      "13:30–14:15",
      "14:25–15:10",
      "15:20–16:05",
      "16:15–17:00"
    ];

    const rowLayout = [
      ["A排", null, "G排"],
      ["B排", null, "H排"],
      ["C排", null, "I排"],
      ["D排", null, "J排"],
      ["E排", null, "K排"],
      ["F排", null, "L排"]
    ];

    const TOTAL_ROWS = 12;

    function generateLockToken() {
      return "lock_" + Date.now() + "_" + Math.random().toString(36).slice(2);
    }

    function generateCancelToken() {
      return "cancel_" + Date.now() + "_" + Math.random().toString(36).slice(2);
    }

    function getTodayString() {
      const today = new Date();
      const yyyy = today.getFullYear();
      const mm = String(today.getMonth() + 1).padStart(2, "0");
      const dd = String(today.getDate()).padStart(2, "0");
      return `${yyyy}-${mm}-${dd}`;
    }

    function setMinDate() {
      document.getElementById("bookingDate").min = getTodayString();
    }

    function isPastTimeSlot(timeText) {
      if (!selectedDate) return false;

      const now = new Date();
      const todayString = getTodayString();

      if (selectedDate < todayString) return true;
      if (selectedDate > todayString) return false;

      const startTime = timeText.split("–")[0];
      const [hour, minute] = startTime.split(":").map(Number);

      const slotStart = new Date(selectedDate + "T00:00:00");
      slotStart.setHours(hour, minute, 0, 0);

      return slotStart <= now;
    }

    function getUserTypeText(type) {
      return type === "internal" ? "雅斯貝學員" : "班外生";
    }

    function buildCancelUrl(date, phone, email, cancelToken) {
      return CANCEL_PAGE_URL +
        "?date=" + encodeURIComponent(date) +
        "&phone=" + encodeURIComponent(phone) +
        "&email=" + encodeURIComponent(email) +
        "&token=" + encodeURIComponent(cancelToken);
    }

    function handleDateChange() {
      const dateInput = document.getElementById("bookingDate");
      const todayString = getTodayString()
      if (holidayList.includes(dateInput.value)) {
      alert("此日期為國定假日，Aspect K書會館公休，暫不開放預約。");
      dateInput.value = "";
      selectedDate = "";
      selectedTimes = [];
      selectedRow = "";
      selectedDayType = "";
      document.getElementById("dayTypeText").innerText = "請先選擇日期";
      document.getElementById("timeButtons").innerHTML = "";
      document.getElementById("selectedTimesText").innerText = "尚未選擇時段";
      document.getElementById("selectedSeatText").innerText = "尚未選擇排位";
      renderRows();
      return;
};

      if (dateInput.value && dateInput.value < todayString) {
        alert("無法預約今天以前的日期");
        dateInput.value = todayString;
      }

      selectedDate = dateInput.value;
      selectedTimes = [];
      selectedRow = "";
      selectedDayType = "";
      releaseLocks();

      document.getElementById("selectedTimesText").innerText = "尚未選擇時段";
      document.getElementById("selectedSeatText").innerText = "尚未選擇排位";

      if (!selectedDate) {
        document.getElementById("dayTypeText").innerText = "請先選擇日期";
        document.getElementById("timeButtons").innerHTML = "";
        renderRows();
        return;
      }

      const day = new Date(selectedDate + "T00:00:00").getDay();
      let times = [];

      if ([1, 4, 5, 6].includes(day)) {
        selectedDayType = "全日開放";
        times = fullDayTimes;
      } else {
        selectedDayType = "開放4堂";
        times = fourLessonTimes;
      }

      document.getElementById("dayTypeText").innerText = "類型：" + selectedDayType;

      renderTimeButtons(times);
      renderRows();
    }

    async function getRemainingRows(time) {
      if (!selectedDate) return TOTAL_ROWS;

      const nowIso = new Date().toISOString();

      const { data: bookedData, error: bookedError } = await supabaseClient
        .from("reservations")
        .select("row_group")
        .eq("booking_date", selectedDate)
        .eq("time_slot", time)
        .eq("status", "booked");

      const { data: lockedData, error: lockedError } = await supabaseClient
        .from("row_locks")
        .select("row_group")
        .eq("booking_date", selectedDate)
        .eq("time_slot", time)
        .eq("status", "locked")
        .gt("locked_until", nowIso);

      if (bookedError || lockedError) {
        console.error("讀取剩餘排位失敗：", bookedError || lockedError);
        return TOTAL_ROWS;
      }

      const usedRows = new Set();
      (bookedData || []).forEach(item => usedRows.add(item.row_group));
      (lockedData || []).forEach(item => usedRows.add(item.row_group));

      return TOTAL_ROWS - usedRows.size;
    }

    function renderTimeButtons(times) {
      const container = document.getElementById("timeButtons");
      container.innerHTML = "";

      times.forEach(function(time) {
        const btn = document.createElement("button");
        btn.type = "button";

        if (isPastTimeSlot(time)) {
          btn.innerText = time + "（已過時段）";
          btn.disabled = true;
          btn.classList.add("past-time");
          container.appendChild(btn);
          return;
        }

        btn.innerText = time + "（讀取中...）";

        getRemainingRows(time).then(function(remaining) {
          if (remaining <= 0) {
            btn.innerText = time + "（已滿）";
            btn.disabled = true;
            btn.classList.add("past-time");
          } else {
            btn.innerText = time + "（剩餘 " + remaining + " 排）";
          }
        });

        btn.onclick = async function() {
          if (btn.disabled) return;

          if (selectedTimes.includes(time)) {
            selectedTimes = selectedTimes.filter(t => t !== time);
            btn.classList.remove("selected");
          } else {
            selectedTimes.push(time);
            btn.classList.add("selected");
          }

          selectedRow = "";
          await releaseLocks();

          document.getElementById("selectedSeatText").innerText = "尚未選擇排位";
          document.getElementById("selectedTimesText").innerText =
            selectedTimes.length === 0 ? "尚未選擇時段" : "已選：" + selectedTimes.join("、");

          renderRows();
        };

        container.appendChild(btn);
      });
    }

    function selectUserType(button, type) {
      userType = type;

      const buttons = button.parentElement.querySelectorAll("button");
      buttons.forEach(btn => btn.classList.remove("selected"));
      button.classList.add("selected");

      document.getElementById("userTypeText").innerText = "已選：" + getUserTypeText(type);
      renderRows();
    }

    async function loadLockedRows() {
      if (!selectedDate || selectedTimes.length === 0) {
        lockedRows = [];
        return;
      }

      const nowIso = new Date().toISOString();

      const { data, error } = await supabaseClient
        .from("row_locks")
        .select("row_group")
        .eq("booking_date", selectedDate)
        .in("time_slot", selectedTimes)
        .eq("status", "locked")
        .gt("locked_until", nowIso);

      if (error) {
        console.error("讀取保留中排位失敗：", error);
        lockedRows = [];
        return;
      }

      lockedRows = (data || []).map(item => item.row_group);
    }

    async function loadBookedRows() {
      if (!selectedDate || selectedTimes.length === 0) {
        bookedRows = [];
        return;
      }

      const { data, error } = await supabaseClient
        .from("reservations")
        .select("row_group")
        .eq("booking_date", selectedDate)
        .in("time_slot", selectedTimes)
        .eq("status", "booked");

      if (error) {
        console.error("讀取已預約排位失敗：", error);
        bookedRows = [];
        return;
      }

      bookedRows = (data || []).map(item => item.row_group);
    }

    async function releaseLocks() {
      if (currentLockTokens.length === 0) return;

      const { error } = await supabaseClient
        .from("row_locks")
        .update({ status: "cancelled" })
        .in("lock_token", currentLockTokens);

      if (error) {
        console.error("釋放鎖位失敗：", error);
      } else {
        currentLockTokens = [];
      }
    }

    async function renderRows() {
      await loadLockedRows();
      await loadBookedRows();

      const grid = document.getElementById("seatGrid");
      grid.innerHTML = "";

      rowLayout.forEach(function(row) {
        row.forEach(function(item) {
          if (item === null) {
            const aisle = document.createElement("div");
            aisle.className = "aisle";
            grid.appendChild(aisle);
            return;
          }

          const rowBtn = document.createElement("button");
          rowBtn.type = "button";
          rowBtn.className = "row-btn";
          rowBtn.innerHTML = item + "<br><small>本排皆可使用</small>";

          if (bookedRows.includes(item)) {
            rowBtn.classList.add("booked-row");
            rowBtn.innerHTML = item + "<br><small>已預約</small>";
            rowBtn.disabled = true;
          } else if (lockedRows.includes(item) && selectedRow !== item) {
            rowBtn.classList.add("locked-row");
            rowBtn.innerHTML = item + "<br><small>保留中</small>";
            rowBtn.disabled = true;
          }

          if (selectedRow === item && !bookedRows.includes(item)) {
            if (userType === "external") {
              rowBtn.classList.add("external-selected");
            } else if (userType === "internal") {
              rowBtn.classList.add("internal-selected");
            } else {
              rowBtn.classList.add("selected");
            }
          }

          rowBtn.onclick = async function() {
            if (!selectedDate || selectedTimes.length === 0) {
              alert("請先選擇日期與時段");
              return;
            }

            if (!userType) {
              alert("請先選擇是否為雅斯貝學員");
              return;
            }

            if (bookedRows.includes(item)) {
              alert("此排已被預約，請選其他排");
              return;
            }

            if (lockedRows.includes(item) && selectedRow !== item) {
              alert("此排目前保留中，請選其他排");
              return;
            }

            await releaseLocks();

            const lockedUntil = new Date(Date.now() + 10 * 60 * 1000).toISOString();

            const lockRows = selectedTimes.map(time => ({
              booking_date: selectedDate,
              time_slot: time,
              row_group: item,
              user_type: userType,
              lock_token: generateLockToken(),
              locked_until: lockedUntil,
              status: "locked"
            }));

            const { error } = await supabaseClient
              .from("row_locks")
              .insert(lockRows);

            if (error) {
              console.error("鎖位失敗：", error);
              alert("鎖位失敗：" + (error.message || "請檢查 Supabase 欄位名稱、RLS 權限或資料格式"));
              return;
            }

            selectedRow = item;
            currentLockTokens = lockRows.map(row => row.lock_token);

            document.getElementById("selectedSeatText").innerText =
              "已選：" + item + "（已為您保留 10 分鐘）";

            alert("會為您保留 10 分鐘");
            renderRows();
          };

          grid.appendChild(rowBtn);
        });
      });
    }

    async function submitBooking() {
      const name = document.getElementById("name").value.trim();
      const phone = document.getElementById("phone").value.trim();
      if (!/^0\d{7,9}$/.test(phone)) {alert("請輸入正確電話號碼，需以 0 開頭，且只能輸入數字。\n例如：062289600 或 0912345678");
  return;
}
      const email = document.getElementById("email").value.trim();

      if (!selectedDate || selectedTimes.length === 0 || !selectedRow || !userType) {
        alert("請先選擇日期、身分、時段與排位");
        return;
      }

      if (!name || !phone || !email) {
        alert("請填寫姓名、電話與 Email");
        return;
      }

      const nowIso = new Date().toISOString();

      const { data: activeLockRows, error: lockCheckError } = await supabaseClient
        .from("row_locks")
        .select("lock_token")
        .in("lock_token", currentLockTokens)
        .eq("status", "locked")
        .gt("locked_until", nowIso);

      if (lockCheckError) {
        console.error("確認鎖位失敗：", lockCheckError);
        alert("確認鎖位失敗，請重新選擇排位");
        return;
      }

      if (!activeLockRows || activeLockRows.length !== selectedTimes.length) {
        alert("保留時間已過或鎖位資料不完整，請重新選擇排位");
        selectedRow = "";
        currentLockTokens = [];
        document.getElementById("selectedSeatText").innerText = "尚未選擇排位";
        renderRows();
        return;
      }

      const timeText = selectedTimes.join("、");
      const cancelToken = generateCancelToken();
      const cancelUrl = buildCancelUrl(selectedDate, phone, email, cancelToken);

      const reservationRows = selectedTimes.map(time => ({
        booking_date: selectedDate,
        time_slot: time,
        row_group: selectedRow,
        user_name: name,
        phone: phone,
        email: email,
        user_type: userType,
        note: "",
        status: "booked",
        cancel_token: cancelToken
      }));

      const { error: reservationError } = await supabaseClient
        .from("reservations")
        .insert(reservationRows);

      if (reservationError) {
        console.error("正式預約寫入失敗：", reservationError);
        alert("正式預約寫入失敗：" + (reservationError.message || "請聯繫櫃台"));
        return;
      }

      const { error: confirmLockError } = await supabaseClient
        .from("row_locks")
        .update({ status: "confirmed" })
        .in("lock_token", currentLockTokens);

      if (confirmLockError) {
        console.error("更新鎖位狀態失敗：", confirmLockError);
      }

      const bookingData = {
        name: name,
        phone: phone,
        email: email,
        date: selectedDate,
        dayType: selectedDayType,
        time: timeText,
        row: selectedRow,
        seat: selectedRow,
        userType: userType,
        cancelToken: cancelToken,
        cancelUrl: cancelUrl
      };

      fetch(SCRIPT_URL, {
        method: "POST",
        mode: "no-cors",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(bookingData)
      });

      document.getElementById("resultText").innerText =
        "預約已送出\n" +
        "姓名：" + name + "\n" +
        "電話：" + phone + "\n" +
        "Email：" + email + "\n" +
        "日期：" + selectedDate + "\n" +
        "開放類型：" + selectedDayType + "\n" +
        "時段：" + timeText + "\n" +
        "排位：" + selectedRow + "\n" +
        "身分：" + getUserTypeText(userType);

      alert("預約已送出，系統將寄出確認信！");

      selectedRow = "";
      currentLockTokens = [];
      document.getElementById("selectedSeatText").innerText = "尚未選擇排位";

      renderRows();
      handleDateChange();
    }

    window.addEventListener("beforeunload", function() {
      releaseLocks();
    });

    window.addEventListener("DOMContentLoaded", function() {
      setMinDate();
      renderRows();
    });
  </script>
</body>
</html>
